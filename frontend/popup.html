<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sentiment Lens</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #111;
      color: #eee;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid #222;
    }
    header span { font-weight: 600; font-size: 13px; letter-spacing: 1px; }
    header small { color: #555; font-size: 10px; }

    main { padding: 16px 14px; display: flex; flex-direction: column; gap: 12px; }

    /* Not a YouTube video message */
    #not-yt {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 28px 14px;
      text-align: center;
    }
    #not-yt .icon { font-size: 32px; }
    #not-yt p { color: #555; line-height: 1.7; }
    #not-yt strong { color: #c8f135; }

    button {
      width: 100%;
      padding: 10px;
      background: #c8f135;
      color: #111;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.ghost { background: #1a1a1a; color: #555; border: 1px solid #222; }
    button.ghost:hover { color: #c8f135; border-color: #c8f135; }

    .row { display: flex; gap: 6px; }

    .chip {
      flex: 1; padding: 8px 4px; border-radius: 6px;
      text-align: center; border: 1px solid #222; background: #1a1a1a;
    }
    .chip b { display: block; font-size: 16px; font-weight: 600; }
    .chip span { color: #555; font-size: 10px; }
    .chip.pos b { color: #34d399; }
    .chip.neu b { color: #94a3b8; }
    .chip.neg b { color: #f87171; }

    .bar { height: 4px; border-radius: 2px; display: flex; gap: 2px; overflow: hidden; }
    .bar div { border-radius: 2px; transition: width 0.6s ease; }
    .bp { background: #34d399; }
    .bn { background: #94a3b8; }
    .bng { background: #f87171; }

    .tabs { display: flex; gap: 4px; }
    .tab {
      flex: 1; padding: 6px; border-radius: 5px;
      background: #1a1a1a; color: #555;
      border: 1px solid #222; font-size: 10px;
      cursor: pointer; font-family: inherit;
    }
    .tab.on { background: #222; color: #eee; border-color: #333; }

    .panel { display: none; }
    .panel.on { display: block; }
    .panel img { width: 100%; border-radius: 6px; display: block; }
    .panel-loader { color: #444; text-align: center; padding: 24px 0; }

    .comments { max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .comments::-webkit-scrollbar { width: 3px; }
    .comments::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .cmt { display: flex; gap: 8px; align-items: flex-start; padding: 6px 8px; border-radius: 5px; background: #1a1a1a; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .dp { background: #34d399; } .dn { background: #94a3b8; } .dng { background: #f87171; }
    .cmt p { color: #aaa; line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

    .err { color: #f87171; font-size: 11px; text-align: center; display: none; }
    #loading { display: none; text-align: center; padding: 20px 0; color: #555; }
  </style>
</head>
<body>

<header>
  <span>SENTIMENT LENS</span>
  <small id="videoLabel">—</small>
</header>

<main>

  <!-- Not a YouTube video -->
  <div id="not-yt">
    <div class="icon">📺</div>
    <p>Open a <strong>YouTube video</strong> tab and<br>click the extension to analyze it.</p>
  </div>

  <!-- Idle: on a valid YT video -->
  <div id="idle">
    <p style="color:#555; margin-bottom:10px; line-height:1.6">Analyze YouTube comments with your AI model.</p>
    <button id="analyzeBtn">⚡ ANALYZE COMMENTS</button>
  </div>

  <!-- Loading -->
  <div id="loading">analyzing…</div>

  <!-- Error -->
  <p class="err" id="err"></p>

  <!-- Results -->
  <div id="results" style="display:none; flex-direction:column; gap:12px;">

    <div class="row">
      <div class="chip pos"><b id="pPos">–</b><span>positive</span></div>
      <div class="chip neu"><b id="pNeu">–</b><span>neutral</span></div>
      <div class="chip neg"><b id="pNeg">–</b><span>negative</span></div>
    </div>

    <div class="bar">
      <div class="bp" id="bPos" style="width:0%"></div>
      <div class="bn" id="bNeu" style="width:0%"></div>
      <div class="bng" id="bNeg" style="width:0%"></div>
    </div>

    <div class="tabs">
      <button class="tab on" data-t="chart">chart</button>
      <button class="tab" data-t="words">words</button>
      <button class="tab" data-t="trend">trend</button>
      <button class="tab" data-t="cmnts">comments</button>
    </div>

    <div class="panel on" id="tab-chart">
      <div class="panel-loader" id="lChart">loading…</div>
      <img id="iChart" style="display:none" />
    </div>
    <div class="panel" id="tab-words">
      <div class="panel-loader" id="lWords">loading…</div>
      <img id="iWords" style="display:none" />
    </div>
    <div class="panel" id="tab-trend">
      <div class="panel-loader" id="lTrend">loading…</div>
      <img id="iTrend" style="display:none" />
    </div>
    <div class="panel" id="tab-cmnts">
      <div class="comments" id="cmtList"></div>
    </div>

    <button class="ghost" id="reBtn">↺ re-analyze</button>
  </div>

</main>

<script src="popup.js"></script>
</body>
</html>
